<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advancer - Умный трекер</title>
    <style>
        *{box-sizing:border-box;margin:0;padding:0}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1e272e;color:#fff;padding:16px;max-width:500px;margin:0 auto}
        .card{background:#2c3e50;border-radius:20px;padding:20px;margin-bottom:16px;box-shadow:0 4px 15px rgba(0,0,0,0.3)}
        h1{font-size:24px;margin-bottom:8px}
        .badge{background:#f1c40f;color:#000;padding:4px 12px;border-radius:30px;font-size:14px;font-weight:bold;display:inline-block;margin-left:8px}
        button{background:#3498db;border:none;color:#fff;padding:12px;border-radius:14px;font-size:16px;width:100%;margin:6px 0;cursor:pointer;font-weight:bold}
        button.gray{background:#7f8c8d}
        input{width:100%;padding:12px;margin:6px 0;border:none;border-radius:12px;font-size:16px;background:#34495e;color:#fff}
        ul{list-style:none;margin-top:12px}
        li{background:#34495e;padding:12px;border-radius:14px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
        .done{text-decoration:line-through;opacity:0.6}
        .tg-link{background:#2c3e50;text-align:center;padding:16px;border-radius:20px;margin-top:16px}
        .tg-link a{color:#f1c40f;font-weight:bold;font-size:18px;text-decoration:none}
    </style>
</head>
<body>
    <div class="card">
        <h1>📚 Advancer <span class="badge" id="roleDisplay">Ученик</span></h1>
        <div id="userInfo" style="margin-top:6px;"></div>
    </div>

    <div class="card">
        <h2>📋 Мои задачи</h2>
        <button id="loadBtn">🔄 Загрузить</button>
        <ul id="taskList"><li style="color:#bdc3c7;text-align:center">Нажмите Загрузить</li></ul>
        <h2 style="margin-top:20px;">➕ Новая задача</h2>
        <input id="titleInp" placeholder="Название">
        <input id="subjInp" placeholder="Предмет">
        <input type="datetime-local" id="deadInp">
        <button id="addBtn">Создать задачу</button>
    </div>

    <div class="tg-link">
        <p>🤖 Открыть в Telegram</p>
        <a href="https://t.me/hakatonyeptaBot" target="_blank" id="botLink">@hakatonyeptaBot</a>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        const BOT_USERNAME = 'hakatonyeptaBot';
        document.getElementById('botLink').href = 'https://t.me/' + BOT_USERNAME;
        document.getElementById('botLink').textContent = '@' + BOT_USERNAME;

        let tg = window.Telegram?.WebApp;
        if (tg) {
            tg.ready();
            tg.expand();
        }

        const urlParams = new URLSearchParams(window.location.search);
        let userId = urlParams.get('user_id');
        let userRole = urlParams.get('role') || '1';
        if (!userId && tg?.initDataUnsafe?.user) {
            userId = tg.initDataUnsafe.user.id;
            document.getElementById('userInfo').textContent = 'Привет, ' + tg.initDataUnsafe.user.first_name;
        } else if (userId) {
            document.getElementById('userInfo').textContent = 'ID: ' + userId;
        } else {
            userId = '123';
            document.getElementById('userInfo').textContent = 'Гость (ID: 123)';
        }
        const roleNames = {1:'Ученик',2:'Учитель',3:'Родитель'};
        document.getElementById('roleDisplay').textContent = roleNames[userRole] || 'Гость';

        let tasks = [];

        async function loadTasks() {
            try {
                const res = await fetch('/api/tasks?user_id=' + userId);
                tasks = await res.json();
                renderTasks();
            } catch(e) {
                document.getElementById('taskList').innerHTML = '<li>Ошибка загрузки</li>';
            }
        }

        function renderTasks() {
            const list = document.getElementById('taskList');
            list.innerHTML = '';
            if (!tasks.length) {
                list.innerHTML = '<li style="color:#bdc3c7;text-align:center">Нет задач</li>';
                return;
            }
            tasks.forEach(task => {
                const li = document.createElement('li');
                li.innerHTML = `<span class="${task.done ? 'done' : ''}"><strong>${task.title}</strong> (${task.subject})<br><small>📅 ${task.deadline}</small></span>
                ${!task.done ? `<button class="gray" style="width:auto;padding:6px 12px;" data-id="${task.id}">✅</button>` : ''}`;
                list.appendChild(li);
            });
            document.querySelectorAll('#taskList .gray').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    const id = e.target.dataset.id;
                    await fetch('/api/tasks/' + id, {
                        method: 'PUT',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({done: true})
                    });
                    loadTasks();
                });
            });
        }

        document.getElementById('loadBtn').addEventListener('click', loadTasks);
        document.getElementById('addBtn').addEventListener('click', async () => {
            const title = document.getElementById('titleInp').value.trim();
            const subject = document.getElementById('subjInp').value.trim() || 'Без предмета';
            const deadline = document.getElementById('deadInp').value || new Date().toISOString().slice(0,16);
            if (!title) return alert('Введите название');
            await fetch('/api/tasks', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    title, subject, deadline: deadline.replace('T', ' '),
                    for_user_id: parseInt(userId),
                    from_user_id: parseInt(userId)
                })
            });
            document.getElementById('titleInp').value = '';
            document.getElementById('subjInp').value = '';
            document.getElementById('deadInp').value = '';
            loadTasks();
        });

        loadTasks();
    </script>
</body>
</html>
